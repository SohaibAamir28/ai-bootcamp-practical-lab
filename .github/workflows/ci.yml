name: AI App CI

# Trigger on every push and every pull request
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ── 01 Get the code ────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 02 Set up Python 3.11 ─────────────────────────────────────────────
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # ── 03 Install dependencies ───────────────────────────────────────────
      - run: pip install -r requirements.txt

      # ── 04 Lint — catches syntax errors, unused imports, style issues ──────
      - run: ruff check .

      # ── 05 Tests — catches broken endpoints and logic errors ───────────────
      # Secrets are injected from Repo → Settings → Secrets and variables → Actions
      # GitHub masks them in logs automatically — they never appear as plain text
      - run: pytest tests/ -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}

      # ── 06 Docker build — catches missing files, bad Dockerfile ───────────
      - run: docker build -t ai-writing-coach:test .
